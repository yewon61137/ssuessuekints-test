<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <title>?ёмҰқ мӨ?.. | SSUESSUE KNITS</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f9f9f9; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader-wrap" style="text-align: center;">
        <div class="loader"></div>
        <div id="statusMessage" style="margin-top: 15px; font-size: 14px; color: #666;">?ёмҰқ ?јн„° ?°кІ° мӨ?..</div>
    </div>

    <!-- кёҖлЎңлІҢ ?җлҹ¬ ?ёл“Ө?? л№„лҸҷкё?лӘЁл“Ҳ лЎңл”© ??л°ңмғқ ?җлҹ¬(кө¬л¬ё ?җлҹ¬ ?? ?¬м°© ?ңлҸ„ -->
    <script>
        window._sendFailure = function(msg) {
            console.error('Final failure:', msg);
            try {
                if (window.opener && !window.opener.closed) {
                    window.opener.postMessage({ type: 'naver_auth_complete', success: false, error: msg }, '*');
                }
                localStorage.setItem('naver_auth_result', JSON.stringify({ type: 'naver_auth_complete', success: false, error: msg }));
            } catch (e) {}
            setTimeout(() => { try { window.close(); } catch (e) {} }, 3000); // 3мҙ????«кё°
        };

        window.onerror = function(msg, url, line) {
            document.getElementById('statusMessage').textContent = '?ӨлҘҳ л°ңмғқ: ' + msg;
            window._sendFailure('?„кё°???ӨлҘҳ (' + line + '): ' + msg);
        };
        window.onunhandledrejection = function(e) {
            document.getElementById('statusMessage').textContent = '?ёмҰқ мӨ‘лӢЁ?? ' + e.reason;
            window._sendFailure('л№„лҸҷкё??ӨлҘҳ: ' + e.reason);
        };

        // 30мҙ??Җ?„м•„??        setTimeout(() => {
            if (document.getElementById('statusMessage').textContent !== '?„лЈҢ') {
                document.getElementById('statusMessage').textContent = '?”мІӯ ?ңк°„ мҙҲкіј';
                window._sendFailure('?ёмҰқ ?”мІӯ ?ңк°„??мҙҲкіј?ҳм—Ҳ?өлӢҲ?? ?ӨмӢң ?ңлҸ„?ҙмЈј?ёмҡ”.');
            }
        }, 30000);
    </script>

    <script type="module">
        const statusEl = document.getElementById('statusMessage');
        function updateStatus(msg) {
            if (statusEl) statusEl.textContent = msg;
        }

        // кІ°кіјлҘ?л¶ҖлӘ?м°Ҫм—җ ?„лӢ¬?ҳлҠ” ?¬нҚј
        function sendResult(data) {
            try {
                if (window.opener && !window.opener.closed) {
                    window.opener.postMessage(data, '*');
                }
            } catch (e) {
                console.warn('postMessage failed:', e);
            }

            try {
                localStorage.setItem('naver_auth_result', JSON.stringify(data));
                if (localStorage.getItem('naver_redirect_fallback') === '1') {
                    localStorage.removeItem('naver_redirect_fallback');
                    // лЎңк·ё???ңмһ‘ ???Җ?Ҙн•ҙ???җлһҳ ?ҳмқҙм§ҖлЎ?ліөк? (?Ҷмңјл©???
                    const returnPath = localStorage.getItem('naver_return_path') || '/';
                    localStorage.removeItem('naver_return_path');
                    window.location.href = returnPath;
                    return;
                }
            } catch (e) {
                console.warn('localStorage fallback failed:', e);
            }

            try { window.close(); } catch (e) {}
        }

        async function handleCallback() {
            try {
                updateStatus('?ёмҰқ мҪ”л“ң ?•мқё мӨ?..');
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                const state = urlParams.get('state');
                const error = urlParams.get('error');

                if (error) {
                    sendResult({ type: 'naver_auth_complete', success: false, error: '?ӨмқҙлІ??ёмҰқ ?ӨнҢЁ: ' + error });
                    return;
                }

                // CSRF л°©м?: state кІҖмҰ?                let savedState = null;
                try {
                    savedState = localStorage.getItem('naver_oauth_state');
                    localStorage.removeItem('naver_oauth_state');
                } catch (e) {}

                if (!state || (savedState && state !== savedState)) {
                    sendResult({ type: 'naver_auth_complete', success: false, error: 'ліҙм•Ҳ кІҖмҰ??ӨнҢЁ. ?ӨмӢң ?ңлҸ„?ҙмЈј?ёмҡ”.' });
                    return;
                }

                if (!code) {
                    sendResult({ type: 'naver_auth_complete', success: false, error: '?ёмҰқ мҪ”л“ңк°Җ ?ҶмҠө?ҲлӢӨ.' });
                    return;
                }

                updateStatus('?ңлІ„???ёмҰқ ?”мІӯ мӨ?..');
                const response = await fetch(`/api/naver?code=${encodeURIComponent(code)}&state=${encodeURIComponent(state)}`);
                if (!response.ok) {
                    let errorMessage = `?ңлІ„ ?‘лӢө ?ӨлҘҳ (${response.status})`;
                    try {
                        const errorData = await response.json();
                        errorMessage = errorData.error || errorMessage;
                    } catch (e) {}
                    throw new Error(errorMessage);
                }

                const data = await response.json();
                if (!data.firebaseToken) throw new Error('?ёмҰқ ? нҒ°??? нҡЁ?ҳм? ?ҠмҠө?ҲлӢӨ.');

                updateStatus('?„лЈҢ');
                // ? нҒ°кі??¬мҡ©???•ліҙлҘ?л¶ҖлӘ?м°ҪмңјлЎ??„лӢ¬ ??Firebase лЎңк·ё?ём? л©”мқё м°Ҫм—җ??мІҳлҰ¬
                sendResult({
                    type: 'naver_auth_complete',
                    success: true,
                    firebaseToken: data.firebaseToken,
                    naverUser: data.naverUser || null,
                    naverEmail: data.naverUser?.email || null
                });

            } catch (e) {
                console.error('Auth traceback:', e);
                updateStatus('?ӨлҘҳ: ' + e.message);
                sendResult({ type: 'naver_auth_complete', success: false, error: 'лЎңк·ё???ӨлҘҳ: ' + e.message });
            }
        }

        handleCallback();
    </script>
