<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
    
    <meta name="robots" content="noindex, nofollow">
    <title>?пҝҪмҰқ пҝҪ?.. | SSUESSUE KNITS</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f9f9f9; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader-wrap" style="text-align: center;">
        <div class="loader"></div>
        <div id="statusMessage" style="margin-top: 15px; font-size: 14px; color: #666;">?пҝҪмҰқ ?пҝҪн„° ?пҝҪкІ° пҝҪ?..</div>
    </div>

    <!-- кёҖлЎңлІҢ ?пҝҪлҹ¬ ?пҝҪл“Ө?? л№„лҸҷпҝҪ?лӘЁл“Ҳ лЎңл”© ??л°ңмғқ ?пҝҪлҹ¬(кө¬л¬ё ?пҝҪлҹ¬ ?? ?пҝҪм°© ?пҝҪлҸ„ -->
    <script>
        window._sendFailure = function(msg) {
            console.error('Final failure:', msg);
            try {
                if (window.opener && !window.opener.closed) {
                    window.opener.postMessage({ type: 'naver_auth_complete', success: false, error: msg }, '*');
                }
                localStorage.setItem('naver_auth_result', JSON.stringify({ type: 'naver_auth_complete', success: false, error: msg }));
            } catch (e) {}
            setTimeout(() => { try { window.close(); } catch (e) {} }, 3000); // 3пҝҪ????пҝҪкё°
        };

        window.onerror = function(msg, url, line) {
            document.getElementById('statusMessage').textContent = '?пҝҪлҘҳ л°ңмғқ: ' + msg;
            window._sendFailure('?пҝҪкё°???пҝҪлҘҳ (' + line + '): ' + msg);
        };
        window.onunhandledrejection = function(e) {
            document.getElementById('statusMessage').textContent = '?пҝҪмҰқ мӨ‘лӢЁ?? ' + e.reason;
            window._sendFailure('л№„лҸҷпҝҪ??пҝҪлҘҳ: ' + e.reason);
        };

        // 30пҝҪ??пҝҪ?пҝҪм•„??        setTimeout(() => {
            if (document.getElementById('statusMessage').textContent !== '?пҝҪлЈҢ') {
                document.getElementById('statusMessage').textContent = '?пҝҪмІӯ ?пҝҪк°„ мҙҲкіј';
                window._sendFailure('?пҝҪмҰқ ?пҝҪмІӯ ?пҝҪк°„??мҙҲкіј?пҝҪм—Ҳ?пҝҪлӢҲ?? ?пҝҪмӢң ?пҝҪлҸ„?пҝҪмЈј?пҝҪмҡ”.');
            }
        }, 30000);
    </script>

    <script type="module">
        const statusEl = document.getElementById('statusMessage');
        function updateStatus(msg) {
            if (statusEl) statusEl.textContent = msg;
        }

        // кІ°кіјпҝҪ?л¶ҖпҝҪ?м°Ҫм—җ ?пҝҪлӢ¬?пҝҪлҠ” ?пҝҪнҚј
        function sendResult(data) {
            try {
                if (window.opener && !window.opener.closed) {
                    window.opener.postMessage(data, '*');
                }
            } catch (e) {
                console.warn('postMessage failed:', e);
            }

            try {
                localStorage.setItem('naver_auth_result', JSON.stringify(data));
                if (localStorage.getItem('naver_redirect_fallback') === '1') {
                    localStorage.removeItem('naver_redirect_fallback');
                    // лЎңк·ё???пҝҪмһ‘ ???пҝҪ?пҝҪн•ҙ???пҝҪлһҳ ?пҝҪмқҙм§ҖпҝҪ?ліөпҝҪ? (?пҝҪмңјпҝҪ???
                    const returnPath = localStorage.getItem('naver_return_path') || '/';
                    localStorage.removeItem('naver_return_path');
                    window.location.href = returnPath;
                    return;
                }
            } catch (e) {
                console.warn('localStorage fallback failed:', e);
            }

            try { window.close(); } catch (e) {}
        }

        async function handleCallback() {
            try {
                updateStatus('?пҝҪмҰқ мҪ”л“ң ?пҝҪмқё пҝҪ?..');
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                const state = urlParams.get('state');
                const error = urlParams.get('error');

                if (error) {
                    sendResult({ type: 'naver_auth_complete', success: false, error: '?пҝҪмқҙпҝҪ??пҝҪмҰқ ?пҝҪнҢЁ: ' + error });
                    return;
                }

                // CSRF л°©пҝҪ?: state кІҖпҝҪ?                let savedState = null;
                try {
                    savedState = localStorage.getItem('naver_oauth_state');
                    localStorage.removeItem('naver_oauth_state');
                } catch (e) {}

                if (!state || (savedState && state !== savedState)) {
                    sendResult({ type: 'naver_auth_complete', success: false, error: 'ліҙм•Ҳ кІҖпҝҪ??пҝҪнҢЁ. ?пҝҪмӢң ?пҝҪлҸ„?пҝҪмЈј?пҝҪмҡ”.' });
                    return;
                }

                if (!code) {
                    sendResult({ type: 'naver_auth_complete', success: false, error: '?пҝҪмҰқ мҪ”л“ңк°Җ ?пҝҪмҠө?пҝҪлӢӨ.' });
                    return;
                }

                updateStatus('?пҝҪлІ„???пҝҪмҰқ ?пҝҪмІӯ пҝҪ?..');
                const response = await fetch(`/api/naver?code=${encodeURIComponent(code)}&state=${encodeURIComponent(state)}`);
                if (!response.ok) {
                    let errorMessage = `?пҝҪлІ„ ?пҝҪлӢө ?пҝҪлҘҳ (${response.status})`;
                    try {
                        const errorData = await response.json();
                        errorMessage = errorData.error || errorMessage;
                    } catch (e) {}
                    throw new Error(errorMessage);
                }

                const data = await response.json();
                if (!data.firebaseToken) throw new Error('?пҝҪмҰқ ?пҝҪнҒ°???пҝҪнҡЁ?пҝҪпҝҪ? ?пҝҪмҠө?пҝҪлӢӨ.');

                updateStatus('?пҝҪлЈҢ');
                // ?пҝҪнҒ°пҝҪ??пҝҪмҡ©???пҝҪліҙпҝҪ?л¶ҖпҝҪ?м°ҪмңјпҝҪ??пҝҪлӢ¬ ??Firebase лЎңк·ё?пҝҪпҝҪ? л©”мқё м°Ҫм—җ??мІҳлҰ¬
                sendResult({
                    type: 'naver_auth_complete',
                    success: true,
                    firebaseToken: data.firebaseToken,
                    naverUser: data.naverUser || null,
                    naverEmail: data.naverUser?.email || null
                });

            } catch (e) {
                console.error('Auth traceback:', e);
                updateStatus('?пҝҪлҘҳ: ' + e.message);
                sendResult({ type: 'naver_auth_complete', success: false, error: 'лЎңк·ё???пҝҪлҘҳ: ' + e.message });
            }
        }

        handleCallback();
    </script>
