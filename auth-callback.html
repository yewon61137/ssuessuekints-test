<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <title>인증 중... | SSUESSUE KNITS</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f9f9f9; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

  <!-- Microsoft Clarity (deferred) -->
  <script>
    window.addEventListener("load", function() {
      (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window,document,"clarity","script","vsvc6kadap");
    });
  </script>
</head>
<body>
    <div class="loader-wrap" style="text-align: center;">
        <div class="loader"></div>
        <div id="statusMessage" style="margin-top: 15px; font-size: 14px; color: #666;">인증 센터 연결 중...</div>
    </div>

    <!-- 글로벌 에러 핸들러: 비동기 모듈 로딩 전 발생 에러(구문 에러 등) 포착 시도 -->
    <script>
        // 언어 감지 및 다국어 메시지 초기화
        (function() {
            const _lang = (function() { try { return localStorage.getItem('ssuessue_lang') || 'ko'; } catch(e) { return 'ko'; } })();
            const _allMsgs = {
                ko: { connecting: '인증 센터 연결 중...', verifying: '인증 코드 확인 중...', requesting: '서버에 인증 요청 중...', done: '완료', timeout: '요청 시간 초과', err_prefix: '오류: ', err_occurred: '오류 발생: ', err_interrupted: '인증 중단됨: ' },
                en: { connecting: 'Connecting to auth server...', verifying: 'Verifying authentication code...', requesting: 'Sending authentication request...', done: 'Complete', timeout: 'Request timed out', err_prefix: 'Error: ', err_occurred: 'Error occurred: ', err_interrupted: 'Authentication interrupted: ' },
                ja: { connecting: '認証サーバーに接続中...', verifying: '認証コードを確認中...', requesting: '認証リクエストを送信中...', done: '完了', timeout: 'リクエストがタイムアウトしました', err_prefix: 'エラー: ', err_occurred: 'エラーが発生しました: ', err_interrupted: '認証が中断されました: ' },
            };
            window._msgs = _allMsgs[_lang] || _allMsgs.ko;
            window._authComplete = false;
            const _statusEl = document.getElementById('statusMessage');
            if (_statusEl) _statusEl.textContent = window._msgs.connecting;
        })();

        window._sendFailure = function(msg) {
            console.error('Final failure:', msg);
            try {
                if (window.opener && !window.opener.closed) {
                    window.opener.postMessage({ type: 'naver_auth_complete', success: false, error: msg }, '*');
                }
                localStorage.setItem('naver_auth_result', JSON.stringify({ type: 'naver_auth_complete', success: false, error: msg }));
            } catch (e) {}
            setTimeout(() => { try { window.close(); } catch (e) {} }, 3000); // 3초 후 닫기
        };

        window.onerror = function(msg, url, line) {
            document.getElementById('statusMessage').textContent = window._msgs.err_occurred + msg;
            window._sendFailure('전기적 오류 (' + line + '): ' + msg);
        };
        window.onunhandledrejection = function(e) {
            document.getElementById('statusMessage').textContent = window._msgs.err_interrupted + e.reason;
            window._sendFailure('비동기 오류: ' + e.reason);
        };

        // 30초 타임아웃
        setTimeout(() => {
            if (!window._authComplete) {
                document.getElementById('statusMessage').textContent = window._msgs.timeout;
                window._sendFailure('인증 요청 시간이 초과되었습니다. 다시 시도해주세요.');
            }
        }, 30000);
    </script>

    <script type="module">
        const statusEl = document.getElementById('statusMessage');
        function updateStatus(msg) {
            if (statusEl) statusEl.textContent = msg;
        }

        // 결과를 부모 창에 전달하는 헬퍼
        function sendResult(data) {
            try {
                if (window.opener && !window.opener.closed) {
                    window.opener.postMessage(data, '*');
                }
            } catch (e) {
                console.warn('postMessage failed:', e);
            }

            try {
                localStorage.setItem('naver_auth_result', JSON.stringify(data));
                if (localStorage.getItem('naver_redirect_fallback') === '1') {
                    localStorage.removeItem('naver_redirect_fallback');
                    // 로그인 시작 전 저장해둔 원래 페이지로 복귀 (없으면 홈)
                    const returnPath = localStorage.getItem('naver_return_path') || '/';
                    localStorage.removeItem('naver_return_path');
                    window.location.href = returnPath;
                    return;
                }
            } catch (e) {
                console.warn('localStorage fallback failed:', e);
            }

            try { window.close(); } catch (e) {}
        }

        async function handleCallback() {
            try {
                updateStatus(window._msgs.verifying);
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                const state = urlParams.get('state');
                const error = urlParams.get('error');

                if (error) {
                    sendResult({ type: 'naver_auth_complete', success: false, error: '네이버 인증 실패: ' + error });
                    return;
                }

                // CSRF 방지: state 검증
                let savedState = null;
                try {
                    savedState = localStorage.getItem('naver_oauth_state');
                    localStorage.removeItem('naver_oauth_state');
                } catch (e) {}

                if (!state || (savedState && state !== savedState)) {
                    sendResult({ type: 'naver_auth_complete', success: false, error: '보안 검증 실패. 다시 시도해주세요.' });
                    return;
                }

                if (!code) {
                    sendResult({ type: 'naver_auth_complete', success: false, error: '인증 코드가 없습니다.' });
                    return;
                }

                updateStatus(window._msgs.requesting);
                const response = await fetch(`/api/naver?code=${encodeURIComponent(code)}&state=${encodeURIComponent(state)}`);
                if (!response.ok) {
                    let errorMessage = `서버 응답 오류 (${response.status})`;
                    try {
                        const errorData = await response.json();
                        errorMessage = errorData.error || errorMessage;
                    } catch (e) {}
                    throw new Error(errorMessage);
                }

                const data = await response.json();
                if (!data.firebaseToken) throw new Error('인증 토큰이 유효하지 않습니다.');

                window._authComplete = true;
                updateStatus(window._msgs.done);
                // 토큰과 사용자 정보를 부모 창으로 전달 — Firebase 로그인은 메인 창에서 처리
                sendResult({
                    type: 'naver_auth_complete',
                    success: true,
                    firebaseToken: data.firebaseToken,
                    naverUser: data.naverUser || null,
                    naverEmail: data.naverUser?.email || null
                });

            } catch (e) {
                console.error('Auth traceback:', e);
                updateStatus(window._msgs.err_prefix + e.message);
                sendResult({ type: 'naver_auth_complete', success: false, error: '로그인 오류: ' + e.message });
            }
        }

        handleCallback();
    </script>
</body>
</html>
