<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <title>인증 중... | SSUESSUE KNITS</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f9f9f9; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
        import { getAuth, signInWithCustomToken, updateProfile } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';
        import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';
        import { firebaseConfig } from './firebase-config.js';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 결과를 부모 창에 전달하는 헬퍼
        // postMessage(opener 살아있는 경우) + localStorage(폴백) 모두 시도
        function sendResult(data) {
            const isPopup = !!(window.opener && !window.opener.closed);
            if (isPopup) {
                window.opener.postMessage(data, window.location.origin);
                window.close();
            } else {
                // opener가 null이거나 팝업이 아닌 경우: localStorage를 통해 부모 창에 전달
                localStorage.setItem('naver_auth_result', JSON.stringify(data));
                // 리다이렉트 폴백이 설정된 경우 (팝업 차단 등) sessionStorage 플래그 세팅 후 이동
                if (localStorage.getItem('naver_redirect_fallback') === '1') {
                    localStorage.removeItem('naver_redirect_fallback');
                    if (data.success) {
                        if (data.naverEmail) sessionStorage.setItem('naver_pending_email', data.naverEmail);
                        if (data.setupNeeded) sessionStorage.setItem('naver_setup_needed', '1');
                    }
                    window.location.href = '/';
                }
                // opener가 살아있지 않으면 storage 이벤트로 부모가 처리
            }
        }

        async function handleCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const state = urlParams.get('state');
            const error = urlParams.get('error');

            if (error) {
                sendResult({ type: 'naver_auth_complete', success: false, error: '네이버 인증 실패: ' + error });
                return;
            }

            // CSRF 방지: state 검증 (localStorage — cross-origin 팝업에서도 접근 가능)
            const savedState = localStorage.getItem('naver_oauth_state');
            localStorage.removeItem('naver_oauth_state');
            if (!state || state !== savedState) {
                sendResult({ type: 'naver_auth_complete', success: false, error: '보안 검증 실패. 다시 로그인해주세요.' });
                return;
            }

            if (!code) {
                sendResult({ type: 'naver_auth_complete', success: false, error: '인증 코드가 없습니다.' });
                return;
            }

            try {
                // 1. 백엔드 API 호출
                const response = await fetch(`/api/naver?code=${encodeURIComponent(code)}&state=${encodeURIComponent(state)}`);
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || '서버 응답 오류');
                }

                const data = await response.json();

                if (!data.firebaseToken) throw new Error('인증 토큰이 유효하지 않습니다.');

                // 2. Firebase 커스텀 토큰으로 로그인
                const result = await signInWithCustomToken(auth, data.firebaseToken);
                const user = result.user;

                // 3. Firebase Auth 프로필 업데이트 (displayName, photoURL)
                if (data.naverUser) {
                    const { nickname, profilePhotoURL } = data.naverUser;
                    if (nickname || profilePhotoURL) {
                        await updateProfile(user, {
                            displayName: nickname || user.displayName || '',
                            photoURL: profilePhotoURL || user.photoURL || ''
                        });
                    }
                }

                // 4. Firestore 프로필 완성 여부 확인
                let setupNeeded = false;
                try {
                    const snap = await getDoc(doc(db, 'users', user.uid));
                    if (!snap.exists() || !snap.data().profileCompleted) setupNeeded = true;
                } catch {
                    setupNeeded = true;
                }

                // 5. 결과 전달
                sendResult({
                    type: 'naver_auth_complete',
                    success: true,
                    setupNeeded,
                    naverEmail: data.naverUser?.email || null
                });

            } catch (e) {
                console.error('Auth error:', e);
                sendResult({ type: 'naver_auth_complete', success: false, error: '로그인 처리 중 오류: ' + e.message });
            }
        }

        handleCallback();
    </script>
</body>
</html>
