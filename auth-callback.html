<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>인증 중... | SSUESSUE KNITS</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f9f9f9; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
        import { getAuth, signInWithCustomToken, updateProfile } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';
        import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';
        import { firebaseConfig } from './firebase-config.js';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        async function handleCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const state = urlParams.get('state');
            const error = urlParams.get('error');

            if (error) {
                alert('네이버 인증 실패: ' + error);
                window.location.href = '/';
                return;
            }

            // CSRF 방지: state 검증
            const savedState = sessionStorage.getItem('oauth_state');
            sessionStorage.removeItem('oauth_state');
            if (!state || state !== savedState) {
                alert('보안 검증 실패. 다시 로그인해주세요.');
                window.location.href = '/';
                return;
            }

            if (code) {
                try {
                    // 1. 백엔드 API 호출
                    const response = await fetch(`/api/naver?code=${encodeURIComponent(code)}&state=${encodeURIComponent(state)}`);
                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error || '서버 응답 오류');
                    }

                    const data = await response.json();

                    if (data.firebaseToken) {
                        // 2. Firebase 커스텀 토큰으로 로그인
                        const result = await signInWithCustomToken(auth, data.firebaseToken);
                        const user = result.user;

                        // 3. Firebase Auth 프로필 업데이트 (displayName, photoURL)
                        if (data.naverUser) {
                            const { nickname, profilePhotoURL } = data.naverUser;
                            if (nickname || profilePhotoURL) {
                                await updateProfile(user, {
                                    displayName: nickname || user.displayName || '',
                                    photoURL: profilePhotoURL || user.photoURL || ''
                                });
                            }
                        }

                        // 4. Naver 이메일 sessionStorage에 보존 (user.email은 커스텀 토큰에서 null)
                        if (data.naverUser?.email) {
                            sessionStorage.setItem('naver_pending_email', data.naverUser.email);
                        }

                        // 5. Firestore 프로필 미완성이면 flag 저장 후 이동
                        try {
                            const snap = await getDoc(doc(db, 'users', user.uid));
                            if (!snap.exists() || !snap.data().profileCompleted) {
                                sessionStorage.setItem('naver_setup_needed', '1');
                            }
                        } catch {
                            // Firestore 읽기 실패해도 신규 유저로 처리
                            sessionStorage.setItem('naver_setup_needed', '1');
                        }

                        window.location.href = '/';
                    } else {
                        throw new Error('인증 토큰이 유효하지 않습니다.');
                    }
                } catch (e) {
                    console.error('Auth error:', e);
                    alert('로그인 처리 중 오류가 발생했습니다: ' + e.message);
                    window.location.href = '/';
                }
            } else {
                alert('인증 코드가 없습니다.');
                window.location.href = '/';
            }
        }

        handleCallback();
    </script>
</body>
</html>
