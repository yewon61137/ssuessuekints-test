<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <title>인증 중... | SSUESSUE KNITS</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f9f9f9; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader-wrap" style="text-align: center;">
        <div class="loader"></div>
        <div id="statusMessage" style="margin-top: 15px; font-size: 14px; color: #666;">인증 센터 연결 중...</div>
    </div>

    <!-- 글로벌 에러 핸들러: 비동기 모듈 로딩 전 발생 에러(구문 에러 등) 포착 시도 -->
    <script>
        window._sendFailure = function(msg) {
            console.error('Final failure:', msg);
            try {
                if (window.opener && !window.opener.closed) {
                    window.opener.postMessage({ type: 'naver_auth_complete', success: false, error: msg }, '*');
                }
                localStorage.setItem('naver_auth_result', JSON.stringify({ type: 'naver_auth_complete', success: false, error: msg }));
            } catch (e) {}
            setTimeout(() => { try { window.close(); } catch (e) {} }, 3000); // 3초 후 닫기
        };

        window.onerror = function(msg, url, line) {
            document.getElementById('statusMessage').textContent = '오류 발생: ' + msg;
            window._sendFailure('전기적 오류 (' + line + '): ' + msg);
        };
        window.onunhandledrejection = function(e) {
            document.getElementById('statusMessage').textContent = '인증 중단됨: ' + e.reason;
            window._sendFailure('비동기 오류: ' + e.reason);
        };

        // 30초 타임아웃
        setTimeout(() => {
            if (document.getElementById('statusMessage').textContent !== '완료') {
                document.getElementById('statusMessage').textContent = '요청 시간 초과';
                window._sendFailure('인증 요청 시간이 초과되었습니다. 다시 시도해주세요.');
            }
        }, 30000);
    </script>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
        import { getAuth, signInWithCustomToken, updateProfile, setPersistence, browserLocalPersistence, browserSessionPersistence } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';
        import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';
        
        let firebaseConfig = null;
        try {
            updateStatus('설정 로드 중...');
            // firebase-config.js import (상대 경로 주의)
            // 브라우저 캐시 방지를 위해 쿼리 스트링 추가 고려 가능
            const configModule = await import('/js/firebase-config.js');
            firebaseConfig = configModule.firebaseConfig;
        } catch (e) {
            console.error('Config load failed:', e);
            updateStatus('설정 파일 로드 실패');
            throw new Error('설정 파일을 불러오지 못했습니다. 서버 구성을 확인해주세요. (' + e.message + ')');
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const statusEl = document.getElementById('statusMessage');
        function updateStatus(msg) {
            if (statusEl) statusEl.textContent = msg;
        }

        // 결과를 부모 창에 전달하는 헬퍼
        function sendResult(data) {
            try {
                if (window.opener && !window.opener.closed) {
                    window.opener.postMessage(data, '*');
                }
            } catch (e) {
                console.warn('postMessage failed:', e);
            }

            try {
                localStorage.setItem('naver_auth_result', JSON.stringify(data));
                if (localStorage.getItem('naver_redirect_fallback') === '1') {
                    localStorage.removeItem('naver_redirect_fallback');
                    if (data.success) {
                        if (data.naverEmail) sessionStorage.setItem('naver_pending_email', data.naverEmail);
                        if (data.setupNeeded) sessionStorage.setItem('naver_setup_needed', '1');
                    }
                    window.location.href = '/';
                    return; 
                }
            } catch (e) {
                console.warn('localStorage fallback failed:', e);
            }

            try {
                window.close();
            } catch (e) {}
        }

        async function handleCallback() {
            try {
                updateStatus('인증 토큰 확인 중...');
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                const state = urlParams.get('state');
                const error = urlParams.get('error');

                if (error) {
                    sendResult({ type: 'naver_auth_complete', success: false, error: '네이버 인증 실패: ' + error });
                    return;
                }

                // CSRF 방지: state 검증
                let savedState = null;
                try {
                    savedState = localStorage.getItem('naver_oauth_state');
                    localStorage.removeItem('naver_oauth_state');
                } catch (e) {}

                if (!state || (savedState && state !== savedState)) {
                    sendResult({ type: 'naver_auth_complete', success: false, error: '보안 검증 실패. 다시 시도해주세요.' });
                    return;
                }

                if (!code) {
                    sendResult({ type: 'naver_auth_complete', success: false, error: '인증 코드가 없습니다.' });
                    return;
                }

                updateStatus('서버에 인증 요청 중...');
                // 1. 백엔드 API 호출
                const response = await fetch(`/api/naver?code=${encodeURIComponent(code)}&state=${encodeURIComponent(state)}`);
                if (!response.ok) {
                    let errorMessage = `서버 응답 오류 (${response.status})`;
                    try {
                        const errorData = await response.json();
                        errorMessage = errorData.error || errorMessage;
                    } catch (e) {}
                    throw new Error(errorMessage);
                }

                const data = await response.json();
                if (!data.firebaseToken) throw new Error('인증 토큰이 유효하지 않습니다.');

                updateStatus('Firebase 로그인 중...');
                // 2. Firebase 커스텀 토큰으로 로그인 (자동 로그인 권한 적용)
                const rm = localStorage.getItem('naver_remember_me') === '1';
                await setPersistence(auth, rm ? browserLocalPersistence : browserSessionPersistence);
                const result = await signInWithCustomToken(auth, data.firebaseToken);
                const user = result.user;

                updateStatus('프로필 정보 동기화 중...');
                // 3. Firebase Auth 프로필 업데이트
                if (data.naverUser) {
                    const { nickname, profilePhotoURL } = data.naverUser;
                    if (nickname || profilePhotoURL) {
                        await updateProfile(user, {
                            displayName: nickname || user.displayName || '',
                            photoURL: profilePhotoURL || user.photoURL || ''
                        });
                    }
                }

                // 4. Firestore 프로필 완성 여부 확인
                let setupNeeded = false;
                try {
                    const snap = await getDoc(doc(db, 'users', user.uid));
                    if (!snap.exists() || !snap.data().profileCompleted) setupNeeded = true;
                } catch {
                    setupNeeded = true;
                }

                updateStatus('완료');
                // 5. 결과 전달
                sendResult({
                    type: 'naver_auth_complete',
                    success: true,
                    setupNeeded,
                    naverEmail: data.naverUser?.email || null
                });

            } catch (e) {
                console.error('Auth traceback:', e);
                updateStatus('오류: ' + e.message);
                sendResult({ type: 'naver_auth_complete', success: false, error: '로그인 오류: ' + e.message });
            }
        }

        handleCallback();
    </script>
</body>
</html>
