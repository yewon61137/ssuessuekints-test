        <div class="article-lang" data-lang="en" style="display:none;">
          <p>Walk into any yarn store and you'll be faced with a wall of yarn in wildly different thicknesses. Choosing the wrong weight leads to gauge problems and disappointing results. This guide breaks down all major yarn weights so you always pick the right one.</p>

          <h2>What Is Yarn Weight?</h2>
          <p>Yarn weight describes the thickness of the yarn strand. Thicker yarn knits up faster but uses more yarn per project; thinner yarn takes longer but gives finer detail. The Craft Yarn Council categorizes yarn into 7 standard weights (0??).</p>

          <h2>The 6 Main Yarn Weights</h2>

          <h3>??Lace (Weight 0) ??For delicate lacework</h3>
          <p>The thinnest yarn available. Used for shawls, lacework, and fine accessories. Pairs with 1.5??.5mm needles or hooks. Gauge: 32??2 sts / 10cm. Requires patience and good lighting ??stitches are tiny.</p>

          <h3>??Fingering / Sock (Weight 1) ??Fine detail projects</h3>
          <p>Lightweight yarn popular for socks, baby items, and fine shawls. Needle size: 2.25??.25mm. Gauge: 28??2 sts / 10cm. Takes time but the finished fabric is soft and long-lasting.</p>

          <h3>??DK / Light Worsted (Weight 3) ??Versatile all-rounder</h3>
          <p>A versatile mid-weight beloved by intermediate knitters. Great for baby garments, lightweight sweaters, and accessories. Needle: 3.5??.5mm. Gauge: 21??4 sts / 10cm.</p>

          <h3>??Worsted / Aran (Weight 4) ??The most popular weight</h3>
          <p>The most widely used yarn weight worldwide. Perfect for sweaters, hats, blankets, and bags. Needle: 4.5??.5mm. Gauge: 16??0 sts / 10cm. Ideal for beginners ??stitches are clearly visible.</p>

          <h3>??Bulky (Weight 5??) ??Fast and dramatic</h3>
          <p>Thick yarn that works up quickly. Great for cozy winter projects ??chunky cowls, beanies, and home décor. Needle: 6??mm. Gauge: 12??5 sts / 10cm.</p>

          <h3>??Super Bulky (Weight 6+) ??Arm knitting friendly</h3>
          <p>Extremely thick yarn, often used for arm knitting or giant needles. Blankets can be completed in hours. Needle: 9mm+. Gauge: 7??1 sts / 10cm.</p>

          <h2>Tips for Reading Yarn Labels</h2>
          <p>Every yarn label shows the recommended needle/hook size and gauge. Always check the label first. The gauge (e.g., "20 sts × 26 rows = 10cm in stockinette") is printed on every quality yarn. If your gauge differs from the pattern, adjust needle size or stitch count.</p>

          <div class="tip-box"><p>?�� <strong>Fiber matters too:</strong> Same weight yarn can feel completely different depending on fiber ??wool is warm and elastic, cotton is cool and inelastic, acrylic is affordable and easy-care. Consider fiber content alongside weight when choosing yarn.</p></div>

          <h2>Substituting Yarn Weights</h2>
          <p>Sometimes the yarn called for in a pattern isn't available. When substituting, always match the weight category first, then verify with a gauge swatch. Going up one weight category (e.g., DK instead of Fingering) means fewer stitches per 10cm ??your finished piece will be larger. Going down one weight means more stitches and a smaller, denser result.</p>
          <p>In general, you can substitute within the same weight category freely. Substituting across two weight categories (e.g., Lace for Worsted) requires significant stitch count recalculation and is not recommended for beginners.</p>

          <h2>Yarn Weight vs. Yardage</h2>
          <p>Heavier yarn uses more fiber per meter, so a 100g ball of Super Bulky has far fewer meters than a 100g ball of Fingering. Always compare yardage (meters or yards), not weight, when calculating how much yarn you need. A typical 100g worsted ball contains 180??20m; the same weight in lace yarn may contain 800m or more.</p>
          <p>Before purchasing, calculate your project's stitch and row count, then divide by the pattern gauge to estimate total yardage. Buy 10??5% extra to account for swatching and weaving in ends ??dye lots vary between skeins, and finding an exact match later can be difficult.</p>

          <h2>Yarn Weight for Crochet vs. Knitting</h2>
          <p>The weight categories and needle/hook sizes are standardized across both crafts, but crochet hooks tend to run slightly larger than equivalent knitting needle sizes for the same yarn weight. This is because crochet stitches require more yarn per stitch, so a slightly larger hook compensates. Always refer to the pattern's specified hook or needle size rather than guessing from weight alone.</p>
