        <div class="article-lang" data-lang="en" style="display:none;">
          <p>The most commonly skipped step in knitting is the gauge swatch. "I'll just start," you think ??then the finished sweater is four sizes too big. This guide explains what gauge is, why it matters, and exactly how to measure and use it.</p>

          <h2>What Is Gauge?</h2>
          <p>Gauge is the number of stitches and rows per 10cm (4 inches) of fabric, measured in a specific stitch pattern. Patterns typically state it as: <em>22 sts × 30 rows = 10cm in stockinette on 4mm needles</em>.</p>
          <p>Even with the same yarn and needle size, every knitter's gauge differs because hand tension varies. Tighter knitters get more stitches per 10cm; looser knitters get fewer.</p>

          <h2>Why Swatch?</h2>
          <p>A gauge mismatch means your finished piece will be a different size than the pattern intends. If the pattern calls for 20 sts/10cm and you get 18 sts/10cm, casting on 100 stitches gives you 100÷18×10 = 55.6cm instead of the intended 50cm ??a 5.6cm difference before you've even started shaping.</p>
          <p>Always swatch for: garments (sweaters, cardigans), fitted hats, socks, and any project where size matters. For scarves and shawls, swatching is optional.</p>

          <h2>How to Swatch</h2>
          <ol>
            <li><strong>Make it big enough:</strong> Knit at least 15cm × 15cm ??ideally 20cm × 20cm. Edges distort, so you measure only the center 10cm.</li>
            <li><strong>Use the right stitch:</strong> Swatch in the same stitch pattern as the project (stockinette for a stockinette sweater, etc.).</li>
            <li><strong>Wash and block first:</strong> Yarns change size after washing. Always wash, block, and dry your swatch the same way you'll care for the finished piece before measuring.</li>
            <li><strong>Measure in the center:</strong> Place pins 10cm apart and count the stitches (and rows) between them. Record to the nearest half-stitch.</li>
          </ol>

          <h2>Adjusting Gauge</h2>
          <p><strong>Too many stitches (too tight):</strong> Go up one needle size.<br>
          <strong>Too few stitches (too loose):</strong> Go down one needle size.<br>
          Re-swatch after each change.</p>

          <p>If you can't achieve gauge by changing needle sizes, calculate the corrected stitch count:</p>
          <div class="calc-box">
            <strong>?�� Gauge Correction Formula</strong>
            <p>Pattern gauge: 20 sts / 10cm | Your gauge: 18 sts / 10cm | Pattern CO: 100 sts</p>
            <span class="calc-formula">Corrected CO = Pattern CO × (Your gauge ÷ Pattern gauge)</span>
            <p>= 100 × (18 ÷ 20) = <strong>90 sts</strong></p>
          </div>

          <h2>Blocking &amp; Gauge</h2>
          <p>Blocking changes your gauge. Wet-blocked wool often opens up, increasing stitch width. Cotton shrinks with washing. Always measure post-blocking. Never start a sized garment from pre-wash gauge measurements.</p>

          <h2>Don't Throw Away Your Swatch</h2>
          <p>Swatches make great fiber sample records. Attach the yarn label and a note about needle size, tension, and washing result. Over time you'll build a personal yarn reference library ??invaluable when you return to a yarn months later.</p>

          <h2>Gauge for Crochet</h2>
          <p>Crochet gauge works on the same principle, but crochet stitches are typically measured differently from knit stitches. Because single crochet stitches are nearly square, patterns often give gauge in both stitches and rows over 10cm. Use the same process: make a large swatch, wash and block it, then measure in the center.</p>
          <p>One important difference: crochet hook sizes have less impact on gauge than knitting needle sizes do, because tension in crochet is mostly controlled by how you hold and feed the yarn. If your gauge is off, first adjust how you tension the working yarn before switching hook sizes.</p>

          <h2>Gauge When Substituting Yarn</h2>
          <p>If you're substituting a different yarn than the one listed in a pattern, swatching becomes even more critical. Two yarns labeled "Worsted Weight" can have significantly different gauges depending on the fiber content and how they are spun. Wool has more elasticity than cotton; a loosely spun singles yarn behaves differently from a tightly plied one. Always swatch the substituted yarn at its own gauge before calculating stitch adjustments.</p>
          <p>The safest substitution approach: find a yarn with the same fiber composition and ply structure as the original, then verify gauge before casting on.</p>
