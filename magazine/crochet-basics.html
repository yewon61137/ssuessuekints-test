        <div class="article-lang" data-lang="en" style="display:none;">
          <p>Crochet uses a single hook to build fabric stitch by stitch. Unlike knitting, each stitch is completed before moving to the next ??so mistakes are easy to fix and 3D shapes are simple to create. This guide covers every foundational technique you need.</p>

          <h2>Tools &amp; Setup</h2>
          <ul>
            <li><strong>Hook:</strong> 4.5??.5mm for beginners (Worsted/Aran weight yarn). Avoid buying a full set right away ??try individual hooks in different materials (aluminum, wood, bamboo, ergonomic grip) to find your preference first.</li>
            <li><strong>Yarn:</strong> Light-colored Worsted acrylic. Easy to see stitches, affordable, washable.</li>
            <li><strong>Scissors, tapestry needle, stitch markers</strong></li>
          </ul>

          <h2>Chain (CH)</h2>
          <p>Make a slip knot on the hook. Yarn over, pull through the loop. Repeat. Chains form your foundation row and turning chains at row starts.</p>

          <h2>Single Crochet (SC)</h2>
          <p>Insert hook into stitch. Yarn over, pull up a loop (2 loops on hook). Yarn over again, pull through both loops. One SC complete. The densest, most versatile crochet stitch.</p>

          <h2>Half Double Crochet (HDC)</h2>
          <p>Yarn over, insert hook. Yarn over, pull up loop (3 loops). Yarn over, pull through all 3 loops. Creates a mid-height stitch with a distinctive third ridge on the back.</p>

          <h2>Double Crochet (DC)</h2>
          <p>Yarn over, insert hook. Yarn over, pull up loop (3 loops). Yarn over, pull through 2 loops (2 remain). Yarn over, pull through last 2 loops. The most widely used stitch ??fast and drapey.</p>

          <h2>Treble Crochet (TR)</h2>
          <p>Yarn over twice, insert hook. [Yarn over, pull through 2 loops] × 3. Creates tall, open fabric. Great for lace and summer garments.</p>

          <h2>Increase (INC) &amp; Decrease (DEC)</h2>
          <p><strong>Increase:</strong> Work 2 stitches into the same stitch. Adds one stitch to your count.</p>
          <p><strong>Invisible Decrease:</strong> Insert hook through front loops only of 2 consecutive stitches simultaneously. Yarn over, pull through both front loops (2 on hook), yarn over, pull through both. Much neater than standard sc2tog ??use this for amigurumi.</p>

          <h2>Magic Ring</h2>
          <p>Wrap yarn twice around finger to make a loop. Insert hook, work the required number of SC into the loop. Pull the yarn tail to close the center hole completely. Essential for working in the round.</p>

          <h2>Working in the Round vs Flat</h2>
          <p><strong>Flat (back and forth):</strong> Turn at end of each row. Good for rectangles, triangles, and flat panels.<br>
          <strong>In the round:</strong> Work continuously in one direction ??great for hats, bags, amigurumi. Use a stitch marker at the round start.</p>

          <h2>Weaving in Ends</h2>
          <p>Thread end onto a tapestry needle. Weave in multiple directions through the back of the fabric for at least 5cm. Trim close. This prevents unraveling even after washing.</p>

          <h2>Recommended First Projects</h2>
          <ul>
            <li><strong>Coaster:</strong> SC only, flat. Done in 30 minutes.</li>
            <li><strong>Ribbed beanie:</strong> HDC in the round with increases.</li>
            <li><strong>Market bag:</strong> DC + chain spaces ??open mesh structure.</li>
            <li><strong>Amigurumi ball:</strong> SC + magic ring + INC/DEC.</li>
            <li><strong>Granny square:</strong> DC + slip stitch + color changes ??endlessly combinable.</li>
          </ul>
