        <div class="article-lang" data-lang="en" style="display:none;">
          <p>A beautiful finished object deserves proper care. Washing and storing knitted items incorrectly can cause irreversible damage ??felting, stretching, or color loss. This guide covers care methods for every major fiber type.</p>

          <h2>Care by Fiber Type</h2>

          <h3>Wool ??Hand wash, cool water</h3>
          <p>Wool felts when agitated in hot water. Use cool water (max 30°C), a wool-safe detergent, and gentle hand washing. Never wring ??press gently in a towel, then block flat to dry. Keep away from direct sunlight.</p>

          <h3>Merino ??Extra gentle</h3>
          <p>Superwash merino can often be machine washed on a wool/delicate cycle. Non-superwash must be hand washed. Merino's fine fibers can pill if rubbed too vigorously.</p>

          <h3>Cotton ??Machine washable but watch for shrinkage</h3>
          <p>Cotton can shrink significantly when washed. Pre-wash your swatch to check shrinkage before starting a project. Machine wash cool (30°C), lay flat to dry. Hot water causes heavy shrinkage.</p>

          <h3>Acrylic ??Easiest care</h3>
          <p>Machine wash on gentle, tumble dry on low. Acrylic is very forgiving ??nearly indestructible with normal washing. However, steam blocking can permanently damage acrylic fibers ("killing" them).</p>

          <h3>Alpaca ??Handle with care</h3>
          <p>Alpaca stretches easily when wet. Support the full weight of the piece when lifting. Hand wash in cool water, block flat, and allow to dry completely before moving.</p>

          <h3>Linen / Bamboo ??Gets softer with washing</h3>
          <p>Plant-based fibers actually improve with washing ??they soften over time. Machine wash on cool, or hand wash. Lay flat to dry. Iron at low temperature if needed.</p>

          <h2>Blocking Methods</h2>
          <h3>Wet Blocking</h3>
          <p>Soak the piece in cool water for 20??0 minutes. Gently press out water (don't wring). Pin to blocking mats to desired dimensions and leave to dry. Best for wool, alpaca, and plant fibers.</p>

          <h3>Spray Blocking</h3>
          <p>Pin the piece to blocking mats first, then mist with a spray bottle until damp. Allow to dry. Gentler than wet blocking ??good for acrylic-wool blends.</p>

          <h3>Steam Blocking</h3>
          <p>Hold a steam iron 2??cm above the fabric (don't touch) and steam gently. Works well for wool. <strong>Never steam acrylic</strong> ??heat permanently damages the fibers.</p>

          <h2>Storage Tips</h2>
          <ul>
            <li>Store in a cool, dry, well-ventilated place ??never in sealed plastic bags (moisture traps mold)</li>
            <li>Use cedar blocks or lavender sachets to repel moths (never mothballs with direct fiber contact)</li>
            <li>Fold heavy pieces rather than hanging ??hanging causes stretching at the shoulders</li>
            <li>Store by fiber type so care needs are grouped together</li>
          </ul>

          <div class="tip-box"><p>?�� <strong>Always test wash your swatch</strong> before starting a project. This tells you exactly how much the yarn shrinks or stretches, so your finished piece comes out the right size.</p></div>

          <h2>Mending &amp; Repair</h2>
          <p>Even well-cared-for knitwear eventually develops worn spots or small holes. The good news is that hand-knitted and crocheted items are very repairable ??often more so than factory-made garments.</p>
          <p><strong>Duplicate stitch:</strong> For surface wear on stockinette, use duplicate stitch to reinforce thinning areas before a hole forms. Thread a tapestry needle with matching yarn and trace over existing stitches to add a protective layer.</p>
          <p><strong>Darning:</strong> For holes, weave a grid of threads across the gap using a darning mushroom or a rounded surface as support. Then weave perpendicular threads over and under the grid to rebuild the fabric.</p>
          <p><strong>Visible mending:</strong> A trend embracing contrasting yarn colors for repairs ??turning damage into a design feature. Japanese boro and sashiko-inspired techniques applied to knitwear have grown popular in the slow fashion community.</p>

          <h2>Reading Care Labels on Commercial Yarn</h2>
          <p>Most yarn labels include international care symbols ??a basin for washing, a triangle for bleaching, a square for drying, an iron icon for pressing. Learn these symbols and you'll always know how to care for any yarn, even when the label is only in another language. If you've lost the yarn label, test an unknown fiber by burning a small strand: wool smells like burnt hair and forms a crushable ash; synthetic fibers melt and smell chemical.</p>
